<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Solo RP</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div id="app">
    <!-- Sidebar ─────────────────────────────────────────────────────────── -->
    <aside id="sidebar">
      <header class="side-head">
        <div class="brand">Solo&nbsp;RP</div>
        <button id="btn-menu" class="icon-btn" title="Menu" aria-label="Menu">≡</button>
      </header>

      <button id="world-switch" class="char-switch" title="Switch or manage worlds">
        <span class="char-switch-avatar" id="world-switch-icon">🌍</span>
        <span class="char-switch-main">
          <span class="char-switch-name" id="world-switch-name">No world</span>
          <span class="char-switch-mode" id="world-switch-mode"></span>
        </span>
        <span class="char-switch-caret">▾</span>
      </button>

      <div class="side-actions">
        <button id="btn-new-chat" class="primary-btn">＋ New scene</button>
      </div>

      <nav id="chat-list" class="chat-list" aria-label="Scenes"></nav>

      <footer class="side-foot">
        <button class="foot-btn" id="btn-cast" title="The cast the AI plays">Cast</button>
        <button class="foot-btn" id="btn-lore" title="World bible / lorebook">Lore</button>
        <button class="foot-btn" id="btn-memory" title="Story memory & known facts">Memory</button>
        <button class="foot-btn" id="btn-personas" title="Your personas">Personas</button>
        <button class="foot-btn" id="btn-settings" title="Settings">Settings</button>
      </footer>
    </aside>

    <!-- Main ────────────────────────────────────────────────────────────── -->
    <main id="main">
      <header id="chat-header">
        <button id="btn-sidebar" class="icon-btn only-mobile" title="Scenes" aria-label="Scenes">≡</button>
        <div class="chat-title-wrap">
          <input id="chat-title" class="chat-title" value="" spellcheck="false" aria-label="Scene title" />
          <button id="scene-summary" class="scene-summary" title="Scene settings"></button>
        </div>
        <button id="btn-ooc" class="icon-btn" title="Ask out-of-character" aria-label="Ask out-of-character">💭</button>
        <button id="btn-scene" class="icon-btn" title="Scene settings" aria-label="Scene settings">⚙</button>
      </header>

      <section id="messages" class="messages" aria-live="polite"></section>

      <div id="composer">
        <div class="composer-inner">
          <div id="gen-status" class="gen-status hidden"></div>
          <div class="composer-box">
            <textarea id="input" rows="1" placeholder="Write your reply…  (Enter to send · /help for commands)"
              aria-label="Your message"></textarea>
            <div class="composer-buttons">
              <button id="btn-stop" class="stop-btn hidden" title="Stop generating">■ Stop</button>
              <button id="btn-send" class="send-btn" title="Send">Send ↵</button>
            </div>
          </div>
          <div class="composer-foot">
            <div class="quick-actions">
              <button id="btn-opening" class="chip-btn" title="Have the AI open the scene">✦ Set the scene</button>
              <button id="btn-regenerate" class="chip-btn" title="Regenerate the last reply">↻ Regenerate</button>
              <button id="btn-continue" class="chip-btn" title="Continue the last reply">→ Continue</button>
              <button id="btn-impersonate" class="chip-btn" title="Let the AI write your next message">🗣 Impersonate</button>
            </div>
            <div id="usage-note" class="usage-note"></div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <div id="modal-root" class="modal-root hidden" aria-hidden="true"></div>
  <div id="toasts" class="toasts"></div>
  <input type="file" id="file-input" class="hidden" />

  <!--
    Boot watchdog. If a module 404s or throws, the browser aborts all of app.js
    and the page sits there dead — and app.js can't report that, because app.js is
    what failed. So this runs first, as a classic script.

    Two rules learned the hard way: it must never block the UI (a wrong diagnosis
    that covers the screen is worse than no diagnosis), and it must not depend on
    app.js cooperating, or pushing one file without the other produces a false
    alarm. It treats any DOM activity as proof of life.
  -->
  <script>
    (function () {
      var shown = false, alive = false;

      // Any mutation means something is running. Cheaper and more reliable than
      // trusting a flag that lives in the file we're trying to diagnose.
      try {
        var mo = new MutationObserver(function () { alive = true; mo.disconnect(); });
        document.addEventListener('DOMContentLoaded', function () {
          mo.observe(document.body, { childList: true, subtree: true });
        });
      } catch (e) {}

      function report(what, detail) {
        if (shown) return;
        shown = true;
        var d = document.createElement('div');
        d.setAttribute('role', 'alert');
        // Top banner, not a curtain: the app underneath stays usable.
        d.style.cssText =
          'position:fixed;left:0;right:0;top:0;z-index:99999;max-height:45vh;overflow:auto;' +
          'padding:12px 14px;background:#2a1a1d;border-bottom:2px solid #e5786d;color:#f0e6e6;' +
          'font:12px/1.55 ui-monospace,Menlo,Consolas,monospace;box-shadow:0 4px 18px rgba(0,0,0,.5)';
        var steps = (window.__soloBoot && window.__soloBoot.done || []).join(' → ') || 'none';
        d.innerHTML =
          '<div style="font-weight:700;color:#e5786d;margin-bottom:4px">Startup problem</div>' +
          '<div style="white-space:pre-wrap;word-break:break-word">' + what +
          (detail ? '\n' + detail : '') + '</div>' +
          '<div style="opacity:.7;margin-top:6px">boot steps completed: ' + steps + '</div>' +
          '<div style="margin-top:10px;display:flex;gap:8px">' +
          '<button id="sw-r" style="padding:7px 12px;border-radius:6px;border:0;background:#6b7cff;color:#fff;font:inherit">Reload</button>' +
          '<button id="sw-x" style="padding:7px 12px;border-radius:6px;border:1px solid #6b5a5c;background:transparent;color:inherit;font:inherit">Dismiss</button>' +
          '</div>';
        (document.body || document.documentElement).appendChild(d);
        document.getElementById('sw-r').onclick = function () { location.reload(); };
        document.getElementById('sw-x').onclick = function () { d.remove(); };
      }

      window.addEventListener('error', function (e) {
        if (e && e.target && e.target !== window && (e.target.src || e.target.href)) {
          report('A file failed to load:', e.target.src || e.target.href);
        } else if (e && e.message) {
          report(e.message, e.filename ? e.filename + ':' + e.lineno : '');
        }
      }, true);

      window.addEventListener('unhandledrejection', function (e) {
        report('Unhandled error during startup', e && e.reason ? String(e.reason) : '');
      });

      window.addEventListener('load', function () {
        setTimeout(function () {
          if (window.__soloBooted) return;              // app said it finished
          if (window.__soloBoot && window.__soloBoot.error) {
            return report('boot() threw at step "' + window.__soloBoot.step + '":',
                          String(window.__soloBoot.error));
          }
          if (alive) return;                           // something rendered; leave it alone
          report('The scripts loaded but nothing started.',
                 'No module error was reported, so a file in src/ may be stale.');
        }, 3000);
      });
    })();
  </script>

  <script type="module" src="./src/app.js"></script>
</body>
</html>
